# Llama Gen Full-Text + Abstracts (short) - reduced max_length to fit on A40/A100 40GB
# Original OOMed on A40 48GB with max_length=8192

input_mode = "full-text-abstracts"

[model]
name = "meta-llama/Llama-3.1-8B-Instruct"
quantisation_enabled = true

[lora]
r = 8
alpha = 16
dropout = 0.1
target_modules = ["q_proj", "k_proj", "v_proj"]

[training]
batch_size = 1  # Reduced for long sequences
learning_rate = 1e-4
num_epochs = 3
warmup_steps = 50
weight_decay = 0.01
max_length = 4096  # reduced from 8192 to fit on A40/A100 40GB
logging_steps = 10
max_new_tokens = 256

[generation]
max_new_tokens = 256
temperature = 0.1
do_sample = true
top_p = 0.9
