# Qwen3-32B Gen Full-Text (4096) - intermediate length between 2000 and 8192
# retrieved papers' raw abstracts
# Requires A100 80GB GPU with gradient checkpointing

input_mode = "full-text-abstracts"

[model]
name = "Qwen/Qwen3-32B"
quantisation_enabled = true

[lora]
r = 8
alpha = 16
dropout = 0.1
target_modules = ["q_proj", "k_proj", "v_proj"]

[training]
batch_size = 1  # Minimal for large model + long sequences
learning_rate = 2e-5  # Lower LR for larger model
num_epochs = 3
warmup_steps = 50
weight_decay = 0.01
max_length = 4096
logging_steps = 10
max_new_tokens = 256

[generation]
max_new_tokens = 256
temperature = 0.1
do_sample = true
top_p = 0.9
